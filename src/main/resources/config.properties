# Configuration Flouci API
# Environment : test | prod
FLOUCI_ENV=test

# Test Environment (Sandbox)
FLOUCI_TEST_URL=https://developers.flouci.com/api
FLOUCI_TEST_PUBLIC_KEY=TEST_PUBLIC_KEY_HERE
FLOUCI_TEST_PRIVATE_KEY=TEST_PRIVATE_KEY_HERE

# Production Environment
FLOUCI_PROD_URL=https://api.flouci.com/api
FLOUCI_PROD_PUBLIC_KEY=YOUR_PROD_PUBLIC_KEY_HERE
FLOUCI_PROD_PRIVATE_KEY=YOUR_PROD_PRIVATE_KEY_HERE

# Timeout en secondes
FLOUCI_TIMEOUT=30

# Retry attempts for payment verification
FLOUCI_MAX_RETRIES=3
