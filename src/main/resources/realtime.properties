# =====================================================================
#  Configuration du module temps réel (Mercure / SSE)
#  ---------------------------------------------------------------------
#  Toutes les valeurs peuvent être surchargées par variables d'environnement
#  (priorité env > propriété > défaut interne) :
#    MERCURE_URL          -> realtime.mercure.publishUrl
#    MERCURE_PUBLIC_URL   -> realtime.mercure.subscribeUrl
#    MERCURE_JWT_SECRET   -> realtime.mercure.jwtSecret
#  Le secret DOIT correspondre à la valeur du docker-compose Mercure.
# =====================================================================

# URL d'écriture (POST des events) appelée par le serveur applicatif (ici, le client JavaFX joue ce rôle aussi).
realtime.mercure.publishUrl=http://localhost:3000/.well-known/mercure

# URL de souscription (GET en stream/SSE) — souvent identique à publishUrl en dev local.
realtime.mercure.subscribeUrl=http://localhost:3000/.well-known/mercure

# Secret HMAC partagé. Doit faire ≥ 32 caractères. À changer en production.
realtime.mercure.jwtSecret=oxyn-dev-secret-change-me-please-use-32+chars

# Activer le module temps réel (false = comportement legacy 100% polling).
realtime.enabled=true

# Délai initial avant tentative de reconnexion SSE (secondes).
realtime.reconnect.initialDelaySeconds=2
# Délai maximum entre deux tentatives (backoff exponentiel).
realtime.reconnect.maxDelaySeconds=30

# Timeout de connexion HTTP (secondes).
realtime.http.connectTimeoutSeconds=5

# Périodicité du polling de repli quand Mercure est indisponible (secondes).
realtime.fallback.pollSeconds=5

# ---------------------------------------------------------------------
# Fake n8n integration (visual/pro workflow simulation)
# ---------------------------------------------------------------------
n8n.simulation=true
n8n.url=http://localhost:5678/webhook/ia-workflow
